name: Smoke Tests

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Clone vivid-core
        run: |
          rm -rf ${{ github.workspace }}/../vivid
          git clone --recurse-submodules https://github.com/seethroughlab/vivid.git ${{ github.workspace }}/../vivid

      - name: Detect build arch
        run: |
          wgpu_lib="${{ github.workspace }}/../vivid/build/_deps/wgpu-macos-x86_64-release-src/lib/libwgpu_native.dylib"
          if [ ! -f "$wgpu_lib" ]; then
            wgpu_lib="${{ github.workspace }}/../vivid/build/_deps/wgpu-macos-arm64-release-src/lib/libwgpu_native.dylib"
          fi
          if [ ! -f "$wgpu_lib" ]; then
            echo "Failed to locate libwgpu_native.dylib in vivid-core build" >&2
            exit 1
          fi
          wgpu_archs=$(lipo -archs "$wgpu_lib")
          if [[ "$wgpu_archs" == *"arm64"* ]]; then
            echo "VIVID_OSX_ARCH=arm64" >> $GITHUB_ENV
          elif [[ "$wgpu_archs" == *"x86_64"* ]]; then
            echo "VIVID_OSX_ARCH=x86_64" >> $GITHUB_ENV
          else
            echo "Unsupported libwgpu_native architectures: $wgpu_archs" >&2
            exit 1
          fi
          echo "Detected libwgpu_native arch(s): $wgpu_archs"

      - name: Configure vivid-core
        run: cmake -B ${{ github.workspace }}/../vivid/build -S ${{ github.workspace }}/../vivid -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_OSX_ARCHITECTURES=${{ env.VIVID_OSX_ARCH }}

      - name: Create app bundle skeleton
        run: mkdir -p ${{ github.workspace }}/../vivid/build/vivid.app/Contents/PlugIns

      - name: Build test_demo_graphs and vivid core operators
        run: cmake --build ${{ github.workspace }}/../vivid/build --target test_demo_graphs operators -j$(sysctl -n hw.logicalcpu)

      - name: Configure package
        run: cmake -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_OSX_ARCHITECTURES=${{ env.VIVID_OSX_ARCH }} -DVIVID_SRC_DIR=${{ github.workspace }}/../vivid -DVIVID_BUILD_DIR=${{ github.workspace }}/../vivid/build -DVIVID_PACKAGE_BUILD_TESTS=ON

      - name: Build package operators and tests
        run: cmake --build build --target operators test_package_manifest test_state_machine test_pattern_algebra -j$(sysctl -n hw.logicalcpu)

      - name: Copy operators to vivid build dir
        run: cp build/*.dylib ${{ github.workspace }}/../vivid/build/

      - name: Run package tests
        run: |
          cd build
          ./test_package_manifest
          ./test_state_machine
          VIVID_CORE_PLUGIN_DIR=${{ github.workspace }}/../vivid/build ./test_pattern_algebra

      - name: Run package graph smoke
        run: cd ${{ github.workspace }}/../vivid/build && ./test_demo_graphs ${{ github.workspace }}/graphs
